<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Horizon</title>
  <link rel="stylesheet" href="tab.css" />
</head>
<body>
  <div class="bg-layer" id="bgLayer"></div>
  <div class="glass-orb" id="glassOrb"></div>

  <div class="container" id="container">
    <section class="hero">
      <p class="greeting" id="greeting">good morning</p>
      <h1 class="time" id="time">--:--</h1>
      <p class="date" id="date">-----</p>
    </section>

    <section class="weather" id="weather">
      <span class="weather-icon" id="weatherIcon">☀️</span>
      <span class="weather-temp" id="weatherTemp">--°</span>
      <span class="weather-desc" id="weatherDesc">loading...</span>
      <span class="weather-hilo" id="weatherHiLo">H --° L --°</span>
    </section>

    <section class="search-bar" id="searchBar" role="search" aria-label="Search">
      <form id="searchForm" class="search-form" autocomplete="off" onsubmit="return false">
        <div class="search-input-row">
          <button type="button" class="mode-chip" id="modeChip" aria-label="Change search engine">
            <span class="mode-chip-icon" id="modeChipIcon"></span>
            <span class="mode-chip-label" id="modeChipLabel">Google</span>
          </button>
          <input type="text" id="searchInput" class="search-input" placeholder="Search the web or ask an AI..." spellcheck="false" autocomplete="off" aria-label="Search query" />
          <button type="button" class="search-toggle" id="searchToggle" aria-label="Show search options" aria-expanded="false">
            <svg viewBox="0 0 12 12" width="12" height="12" aria-hidden="true"><path d="M2 4 L6 8 L10 4" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
        </div>
      </form>
      <div class="search-panel" id="searchPanel" aria-hidden="true">
        <div class="search-panel-tabs" id="searchPanelTabs" role="tablist"></div>
        <div class="search-panel-recent" id="searchPanelRecent"></div>
        <div class="search-panel-grid" id="searchPanelGrid"></div>
        <div class="search-panel-footer" id="searchPanelFooter"></div>
      </div>
    </section>

    <section class="links" id="links"></section>
  </div>

  <button class="settings-toggle" id="settingsToggle" title="Customize">⚙️</button>

  <div class="settings-backdrop" id="settingsBackdrop"></div>
  <div class="settings-panel" id="settingsPanel">
    <div class="settings-header">
      <h2 id="settingsTitle">Horizon</h2>
      <button class="settings-close" id="settingsClose">✕</button>
    </div>
    <div class="settings-body" id="settingsBody"></div>
  </div>

  <input type="file" id="bgUpload" accept="image/*" hidden />

  <script src="tab.js"></script>
</body>
</html>
