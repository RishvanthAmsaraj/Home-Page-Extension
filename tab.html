<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Horizon</title>
  <link rel="stylesheet" href="tab.css" />
</head>
<body>
  <div class="bg-layer" id="bgLayer"></div>
  <div class="glass-orb" id="glassOrb"></div>

  <div class="container">
    <section class="hero">
      <p class="greeting" id="greeting">good morning</p>
      <h1 class="time" id="time">--:--</h1>
      <p class="date" id="date">-----</p>
    </section>

    <section class="weather" id="weather">
      <span class="weather-icon" id="weatherIcon">☀️</span>
      <span class="weather-temp" id="weatherTemp">--°</span>
      <span class="weather-desc" id="weatherDesc">loading...</span>
      <span class="weather-hilo" id="weatherHiLo">H --° L --°</span>
    </section>

    <section class="search-section">
      <form id="searchForm">
        <div class="search-row">
          <input type="text" id="searchInput" placeholder="Search or type a URL..." autofocus spellcheck="false" autocomplete="off" />
          <div class="mode-toggle">
            <button type="button" class="mode-btn active" id="modeWeb">🌐</button>
            <button type="button" class="mode-btn" id="modeAI">🤖</button>
          </div>
        </div>
      </form>

      <!-- AI provider chips (visible in AI mode) -->
      <div class="ai-chips" id="aiChips">
        <button type="button" class="ai-chip active" data-ai="chatgpt">ChatGPT</button>
        <button type="button" class="ai-chip" data-ai="claude">Claude</button>
        <button type="button" class="ai-chip" data-ai="gemini">Gemini</button>
        <button type="button" class="ai-chip" data-ai="perplexity">Perplexity</button>
        <button type="button" class="ai-chip" data-ai="grok">Grok</button>
        <button type="button" class="ai-chip" data-ai="deepseek">DeepSeek</button>
      </div>

      <!-- Type filter chips + AI-free toggle (visible in Web mode) -->
      <div class="type-chips" id="typeChips">
        <button type="button" class="type-chip active" data-type="all">All</button>
        <button type="button" class="type-chip" data-type="reddit">Reddit</button>
        <button type="button" class="type-chip" data-type="article">News</button>
        <button type="button" class="type-chip" data-type="pdf">PDF</button>
        <button type="button" class="type-chip" data-type="video">Video</button>
        <button type="button" class="type-chip" data-type="images">Images</button>
        <button type="button" class="type-chip type-ai-free" id="aiFreeToggle">🤖✖ AI Free</button>
      </div>
    </section>

    <section class="links" id="links"></section>
  </div>

  <button class="settings-toggle" id="settingsToggle" title="Customize">⚙️</button>

  <div class="settings-backdrop" id="settingsBackdrop"></div>
  <div class="settings-panel" id="settingsPanel">
    <div class="settings-header">
      <h2 id="settingsTitle">Horizon</h2>
      <button class="settings-close" id="settingsClose">✕</button>
    </div>
    <div class="settings-body" id="settingsBody"></div>
  </div>

  <input type="file" id="bgUpload" accept="image/*" hidden />

  <script src="tab.js"></script>
</body>
</html>
