<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Horizon</title>
  <link rel="stylesheet" href="tab.css" />
</head>
<body>
  <div class="bg-layer" id="bgLayer"></div>
  <div class="glass-orb" id="glassOrb"></div>

  <div class="container">
    <section class="hero">
      <p class="greeting" id="greeting">good morning</p>
      <h1 class="time" id="time">--:--</h1>
      <p class="date" id="date">-----</p>
    </section>

    <section class="weather" id="weather">
      <span class="weather-icon" id="weatherIcon">☀️</span>
      <span class="weather-temp" id="weatherTemp">--°</span>
      <span class="weather-desc" id="weatherDesc">loading...</span>
      <span class="weather-hilo" id="weatherHiLo">H --° L --°</span>
    </section>

    <section class="search-section" id="searchSection">
      <form id="searchForm">
        <div class="search-row">
          <span class="mode-tag" id="modeTag">🌐 Google</span>
          <input type="text" id="searchInput" placeholder="Search..." autofocus spellcheck="false" autocomplete="off" />
          <span class="search-arrow" id="searchArrow">▼</span>
        </div>
      </form>

      <!-- Expandable drawer — reveals on input focus -->
      <div class="search-drawer-wrap">
        <div class="search-drawer" id="searchDrawer">
          <div class="drawer-section">
            <div class="drawer-label">Web</div>
            <div class="drawer-grid" id="drawerWeb">
              <!-- populated by JS -->
            </div>
          </div>
          <div class="drawer-divider"></div>
          <div class="drawer-section">
            <div class="drawer-label">AI Chat</div>
            <div class="drawer-grid" id="drawerAI">
              <!-- populated by JS -->
            </div>
          </div>
        </div>
      </div>

      <!-- Filter bar (below drawer when open) -->
      <div class="filter-bar" id="filterBar">
        <!-- populated by JS -->
      </div>

      <p class="ai-hint" id="aiModeHint"></p>
    </section>

    <section class="links" id="links"></section>
  </div>

  <button class="settings-toggle" id="settingsToggle" title="Customize">⚙️</button>

  <div class="settings-backdrop" id="settingsBackdrop"></div>
  <div class="settings-panel" id="settingsPanel">
    <div class="settings-header">
      <h2 id="settingsTitle">Horizon</h2>
      <button class="settings-close" id="settingsClose">✕</button>
    </div>
    <div class="settings-body" id="settingsBody"></div>
  </div>

  <input type="file" id="bgUpload" accept="image/*" hidden />

  <script src="tab.js"></script>
</body>
</html>
